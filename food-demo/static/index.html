<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Analyzer Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Food Analyzer Demo</h1>
    <p class="subtitle">Subí una foto de una comida y obtené una estimación nutricional.</p>

    <div class="card">
      <input id="fileInput" type="file" accept="image/*" capture="environment" />
      <button id="analyzeBtn">Analizar</button>
    </div>

    <div class="card preview-wrap">
      <img id="preview" alt="Vista previa de la imagen" />
    </div>

    <div id="status" class="status"></div>

    <div id="resultBox" class="card hidden">
      <h2>Resultado</h2>
      <div id="prettyResult"></div>
      <h3>JSON</h3>
      <pre id="jsonOutput"></pre>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
